            - `type: "LastKnownReconciled"`: Sticky cross-generation condition — stays True as long as all required adapters were reconciled at a common observed generation, even if a newer generation is being processed.

            These conditions are present immediately upon resource creation.
      description: |-
        NodePool status computed from all status conditions.

        This object is computed by the service and CANNOT be modified directly.
    ObjectReference:
      type: object
      properties:
        id:
          type: string
          description: Resource identifier
        kind:
          type: string
          description: Resource kind
        href:
          type: string
          description: Resource URI
    OrderDirection:
      type: string
      enum:
        - asc
        - desc
    ReleaseSpec:
      type: object
      properties:
        image:
          type: string
        version:
          type: string
    ResourceCondition:
      type: object
      required:
        - type
        - last_transition_time
        - status
        - observed_generation
        - created_time
        - last_updated_time
      properties:
        type:
          type: string
          description: Condition type
        reason:
          type: string
          description: Machine-readable reason code
        message:
          type: string
          description: Human-readable message
        last_transition_time:
          type: string
          format: date-time
          description: |-
            When this condition last transitioned status (API-managed)
            Only updated when status changes (True/False), not when reason/message changes
        status:
          $ref: '#/components/schemas/ResourceConditionStatus'
        observed_generation:
          type: integer
          format: int32
          description: Generation of the spec that this condition reflects
        created_time:
          type: string
          format: date-time
          description: When this condition was first created (API-managed)
        last_updated_time:
          type: string
          format: date-time
          description: |-
            When the corresponding adapter last reported (API-managed)
            Updated every time the adapter PUTs, even if condition status hasn't changed
            Copied from AdapterStatus.last_report_time
      description: |-
        Condition in Cluster/NodePool status
        Used for semantic condition types: "ValidationSuccessful", "DNSSuccessful", "NodePoolSuccessful", etc.
        Includes observed_generation and last_updated_time to track adapter-specific state
    ResourceConditionStatus:
      type: string
      enum:
        - 'True'
        - 'False'
      description: Status value for resource conditions
    TaintSpec:
      type: object
      required:
        - key
        - effect
      properties:
        key:
          type: string
        value:
          type: string
        effect:
          type: string
          enum:
            - NoSchedule
            - PreferNoSchedule
            - NoExecute
    ValidationError:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: JSON path to the field that failed validation
          example: spec.name
        value:
          description: The invalid value that was provided (if safe to include)
        constraint:
          type: string
          enum:
            - required
            - min
            - max
            - min_length
            - max_length
            - pattern
            - enum
            - format
            - unique
          description: The validation constraint that was violated
          example: required
        message:
          type: string
          description: Human-readable error message for this field
          example: Cluster name is required
      description: Field-level validation error detail
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
servers:
  - url: https://hyperfleet.redhat.com
    description: Production
    variables: {}
