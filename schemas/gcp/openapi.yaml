openapi: 3.0.0
info:
  title: HyperFleet API
  version: 1.0.15
  contact:
    name: HyperFleet Team
    url: https://github.com/openshift-hyperfleet
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  description: |-
    HyperFleet API provides simple CRUD operations for managing cluster resources and their status history.

    **Architecture**: Simple CRUD only, no business logic, no event creation.
    Sentinel operator handles all orchestration logic.
    Adapters handle the specifics of managing spec
tags:
  - name: Clusters
  - name: Cluster statuses
  - name: NodePool statuses
  - name: NodePools
paths:
  /api/hyperfleet/v1/clusters:
    get:
      operationId: getClusters
      summary: List clusters
      description: Returns a list of all clusters.
      parameters:
        - $ref: '#/components/parameters/SearchParams'
        - $ref: '#/components/parameters/QueryParams.page'
        - $ref: '#/components/parameters/QueryParams.pageSize'
        - $ref: '#/components/parameters/QueryParams.orderBy'
        - $ref: '#/components/parameters/QueryParams.order'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterList'
        '400':
          description: The server could not understand the request due to invalid syntax.
        default:
          description: An unexpected error response.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Clusters
      security:
        - BearerAuth: []
    post:
      operationId: postCluster
      summary: Create cluster
      description: |-
        Create a new cluster resource.

        **Note**: The `status` object in the response is read-only and computed by the service.
        It is NOT part of the request body. Initially,
        status.conditions will include mandatory "LastKnownReconciled" and "Reconciled" conditions.
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
        '400':
          description: The server could not understand the request due to invalid syntax.
        default:
          description: An unexpected error response.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Clusters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClusterCreateRequest'
      security:
        - BearerAuth: []
  /api/hyperfleet/v1/clusters/{cluster_id}:
    get:
      operationId: getClusterById
      summary: Get cluster by ID
      description: Returns a single cluster by its ID.
      parameters:
        - $ref: '#/components/parameters/SearchParams'
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
        '400':
          description: The server could not understand the request due to invalid syntax.
        default:
          description: An unexpected error response.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Clusters
      security:
        - BearerAuth: []
    patch:
      operationId: patchClusterById
      summary: Patch cluster by ID
      description: Patch a specific cluster by ID
      parameters:
        - name: cluster_id
          in: path
          required: true
          description: Cluster ID
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
        '400':
          description: The server could not understand the request due to invalid syntax.
        '404':
          description: The server cannot find the requested resource.
        '409':
          description: The request conflicts with the current state of the server.
        default:
          description: An unexpected error response.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Clusters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClusterPatchRequest'
      security:
        - BearerAuth: []
    delete:
      operationId: deleteClusterById
      summary: Request cluster deletion
      description: |-
        Marks the cluster for deletion by setting deleted_time to the current time, cascades to its nodepools.
        The cluster remains in the database until it is fully deleted.
        Returns the updated cluster with generation incremented.
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '202':
          description: The request has been accepted for processing, but processing has not yet completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
              example:
                kind: Cluster
                id: 019466a0-8f8e-7abc-9def-0123456789ab
                href: https://api.hyperfleet.com/v1/clusters/019466a0-8f8e-7abc-9def-0123456789ab
                name: cluster-123
                labels:
                  environment: production
                  team: platform
                spec:
                  platform:
                    type: gcp
                    gcp:
                      projectID: project-123
                      region: us-central1
                      zone: us-central1-a
                      network: network-123
                      subnet: subnet-123
                  release:
                    image: registry.redhat.io/openshift4/ose-cluster-version-operator:v4.14.0
                    version: 4.14.0
                  networking:
                    clusterNetwork:
                      - cidr: 10.10.0.0/16
                        hostPrefix: 24
                    serviceNetwork:
                      - 10.96.0.0/12
                  dns:
                    baseDomain: example.com
                generation: 2
                status:
                  conditions:
                    - type: Reconciled
                      status: 'True'
                      reason: ReconciledAll
                      message: All required adapters reported Available=True or Finalized=True at the current generation
                      observed_generation: 2
                      created_time: '2021-01-01T10:00:00Z'
                      last_updated_time: '2021-01-01T10:00:00Z'
                      last_transition_time: '2021-01-01T10:00:00Z'
                    - type: LastKnownReconciled
                      status: 'True'
                      reason: AllAdaptersReconciled
                      message: All required adapters report Available=True for the tracked generation
                      observed_generation: 2
                      created_time: '2021-01-01T10:00:00Z'
                      last_updated_time: '2021-01-01T10:00:00Z'
                      last_transition_time: '2021-01-01T10:00:00Z'
                    - type: Adapter1Successful
                      status: 'True'
                      reason: This adapter1 is available
                      message: This adapter1 is available
                      observed_generation: 2
                      created_time: '2021-01-01T10:00:00Z'
                      last_updated_time: '2021-01-01T10:00:00Z'
                      last_transition_time: '2021-01-01T10:00:00Z'
                    - type: Adapter2Successful
                      status: 'True'
                      reason: This adapter2 is available
                      message: This adapter2 is available
                      observed_generation: 2
                      created_time: '2021-01-01T10:01:00Z'
                      last_updated_time: '2021-01-01T10:01:00Z'
                      last_transition_time: '2021-01-01T10:01:00Z'
                created_time: '2021-01-01T00:00:00Z'
                updated_time: '2021-01-01T10:02:00Z'
                deleted_time: '2021-01-01T10:05:00Z'
                created_by: user-123@example.com
                updated_by: user-123@example.com
                deleted_by: user-123@example.com
        '400':
          description: The server could not understand the request due to invalid syntax.
        '404':
          description: The server cannot find the requested resource.
        default:
          description: An unexpected error response.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Clusters
      security:
        - BearerAuth: []
  /api/hyperfleet/v1/clusters/{cluster_id}/force-delete:
    post:
      operationId: forceDeleteCluster
      summary: Force-delete a cluster
      description: |-
        Permanently removes a cluster that is stuck in Finalizing state.
        Requires a reason for audit purposes.
      parameters:
        - name: cluster_id
          in: path
          required: true
          description: Cluster ID
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '400':
          description: The server could not understand the request due to invalid syntax.
        '404':
          description: The server cannot find the requested resource.
        '409':
          description: The request conflicts with the current state of the server.
        default:
          description: An unexpected error response.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Clusters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForceDeleteRequest'
      security:
        - BearerAuth: []
  /api/hyperfleet/v1/clusters/{cluster_id}/nodepools:
    get:
      operationId: getNodePoolsByClusterId
      summary: List all nodepools for cluster
      description: Returns the list of all nodepools for a cluster
      parameters:
        - name: cluster_id
          in: path
          required: true
          description: Cluster ID
          schema:
            type: string
        - $ref: '#/components/parameters/SearchParams'
        - $ref: '#/components/parameters/QueryParams.page'
        - $ref: '#/components/parameters/QueryParams.pageSize'
        - $ref: '#/components/parameters/QueryParams.orderBy'
        - $ref: '#/components/parameters/QueryParams.order'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodePoolList'
        '400':
          description: The server could not understand the request due to invalid syntax.
        default:
          description: An unexpected error response.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - NodePools
      security:
        - BearerAuth: []
    post:
      operationId: createNodePool
      summary: Create nodepool
      description: Create a NodePool for a cluster
      parameters:
        - name: cluster_id
          in: path
          required: true
          description: Cluster ID
          schema:
            type: string
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodePoolCreateResponse'
        '400':
          description: The server could not understand the request due to invalid syntax.
        '409':
          description: The request conflicts with the current state of the server.
        default:
          description: An unexpected error response.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - NodePools
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodePoolCreateRequest'
      security:
        - BearerAuth: []
  /api/hyperfleet/v1/clusters/{cluster_id}/nodepools/{nodepool_id}:
    get:
      operationId: getNodePoolById
      summary: Get nodepool by ID
      description: Returns specific nodepool
      parameters:
        - name: cluster_id
          in: path
          required: true
          description: Cluster ID
          schema:
            type: string
        - name: nodepool_id
          in: path
          required: true
          description: NodePool ID
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodePool'
        '400':
          description: The server could not understand the request due to invalid syntax.
        default:
          description: An unexpected error response.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - NodePools
      security:
        - BearerAuth: []
    delete:
      operationId: deleteNodePoolById
      summary: Request nodepool deletion
      description: |-
        Marks the nodepool for deletion by setting deleted_time and deleted_by. Does not affect the parent cluster.
        Returns the updated nodepool with generation incremented.
      parameters:
        - name: cluster_id
          in: path
          required: true
          description: Cluster ID
          schema:
            type: string
        - name: nodepool_id
          in: path
          required: true
          description: NodePool ID
          schema:
            type: string
      responses:
        '202':
          description: The request has been accepted for processing, but processing has not yet completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodePool'
              example:
                kind: NodePool
                id: 019466a1-2b3c-7def-8abc-456789abcdef
                href: https://api.hyperfleet.com/v1/nodepools/019466a1-2b3c-7def-8abc-456789abcdef
                name: worker-pool-1
                labels:
                  environment: production
                  pooltype: worker
                generation: 2
                spec:
                  platform:
                    type: gcp
                    gcp:
                      machineType: n1-standard-4
                      diskSize: 100
                      diskType: pd-standard
                      zones:
                        - us-central1-a
                        - us-central1-b
                      preemptible: false
                      labels:
                        team: platform
                        managedby: hyperfleet
                  nodeCount: 3
                  autoscaling:
                    enabled: true
                    minNodes: 1
                    maxNodes: 10
                    targetCPUUtilization: 80
                owner_references:
                  id: 019466a0-8f8e-7abc-9def-0123456789ab
                  kind: Cluster
                  href: https://api.hyperfleet.com/v1/clusters/019466a0-8f8e-7abc-9def-0123456789ab
                status:
                  conditions:
                    - type: Reconciled
                      status: 'True'
                      reason: ReconciledAll
                      message: All required adapters reported Available=True or Finalized=True at the current generation
                      observed_generation: 2
                      created_time: '2021-01-01T10:00:00Z'
                      last_updated_time: '2021-01-01T10:00:00Z'
                      last_transition_time: '2021-01-01T10:00:00Z'
                    - type: LastKnownReconciled
                      status: 'True'
                      reason: AllAdaptersReconciled
                      message: All required adapters report Available=True for the tracked generation
                      observed_generation: 2
                      created_time: '2021-01-01T10:00:00Z'
                      last_updated_time: '2021-01-01T10:00:00Z'
                      last_transition_time: '2021-01-01T10:00:00Z'
                    - type: ValidationSuccessful
                      status: 'True'
                      reason: All validations passed
                      message: NodePool validation passed
                      observed_generation: 2
                      created_time: '2021-01-01T10:00:00Z'
                      last_updated_time: '2021-01-01T10:00:00Z'
                      last_transition_time: '2021-01-01T10:00:00Z'
                    - type: NodePoolSuccessful
                      status: 'True'
                      reason: NodePool provisioned successfully
                      message: NodePool has 3 nodes running
                      observed_generation: 2
                      created_time: '2021-01-01T10:01:00Z'
                      last_updated_time: '2021-01-01T10:01:00Z'
                      last_transition_time: '2021-01-01T10:01:00Z'
                created_time: '2021-01-01T00:00:00Z'
                updated_time: '2021-01-01T10:02:00Z'
                deleted_time: '2021-01-01T10:05:00Z'
                created_by: user-123@example.com
                updated_by: user-123@example.com
                deleted_by: user-123@example.com
        '400':
          description: The server could not understand the request due to invalid syntax.
        '404':
          description: The server cannot find the requested resource.
        default:
          description: An unexpected error response.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - NodePools
      security:
        - BearerAuth: []
    patch:
      operationId: patchNodePoolById
      summary: Patch nodepool by ID
      description: Patch a specific nodepool within a cluster
      parameters:
        - name: cluster_id
          in: path
          required: true
          description: Cluster ID
          schema:
            type: string
        - name: nodepool_id
          in: path
          required: true
          description: NodePool ID
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodePool'
        '400':
          description: The server could not understand the request due to invalid syntax.
        '404':
          description: The server cannot find the requested resource.
        '409':
          description: The request conflicts with the current state of the server.
        default:
          description: An unexpected error response.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - NodePools
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodePoolPatchRequest'
      security:
        - BearerAuth: []
  /api/hyperfleet/v1/clusters/{cluster_id}/nodepools/{nodepool_id}/force-delete:
    post:
      operationId: forceDeleteNodePool
      summary: Force-delete a nodepool
      description: |-
        Permanently removes a nodepool that is stuck in Finalizing state.
        Requires a reason for audit purposes.
      parameters:
        - name: cluster_id
          in: path
          required: true
          description: Cluster ID
          schema:
            type: string
        - name: nodepool_id
          in: path
          required: true
          description: NodePool ID
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '400':
          description: The server could not understand the request due to invalid syntax.
        '404':
          description: The server cannot find the requested resource.
        '409':
          description: The request conflicts with the current state of the server.
        default:
          description: An unexpected error response.
          content:
            application/problem+json:
              schema:
