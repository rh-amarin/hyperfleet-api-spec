      Used for semantic condition types: "ValidationSuccessful",
      "DNSSuccessful", "NodePoolSuccessful", etc.

      Includes observed_generation and last_updated_time to track
      adapter-specific state
    properties:
      created_time:
        description: When this condition was first created (API-managed)
        format: date-time
        type: string
      last_transition_time:
        description: >-
          When this condition last transitioned status (API-managed)

          Only updated when status changes (True/False), not when reason/message
          changes
        format: date-time
        type: string
      last_updated_time:
        description: >-
          When the corresponding adapter last reported (API-managed)

          Updated every time the adapter PUTs, even if condition status hasn't
          changed

          Copied from AdapterStatus.last_report_time
        format: date-time
        type: string
      message:
        description: Human-readable message
        type: string
      observed_generation:
        description: Generation of the spec that this condition reflects
        format: int32
        type: integer
      reason:
        description: Machine-readable reason code
        type: string
      status:
        $ref: '#/definitions/ResourceConditionStatus'
      type:
        description: Condition type
        type: string
    required:
      - type
      - last_transition_time
      - status
      - observed_generation
      - created_time
      - last_updated_time
    type: object
  ResourceConditionStatus:
    description: Status value for resource conditions
    enum:
      - 'True'
      - 'False'
    type: string
  ValidationError:
    description: Field-level validation error detail
    properties:
      constraint:
        description: The validation constraint that was violated
        enum:
          - required
          - min
          - max
          - min_length
          - max_length
          - pattern
          - enum
          - format
          - unique
        example: required
        type: string
      field:
        description: JSON path to the field that failed validation
        example: spec.name
        type: string
      message:
        description: Human-readable error message for this field
        example: Cluster name is required
        type: string
      value:
        description: The invalid value that was provided (if safe to include)
    required:
      - field
      - message
    type: object
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
tags:
  - name: Clusters
  - name: Cluster statuses
  - name: NodePool statuses
  - name: NodePools
x-components:
  parameters:
    QueryParams.order:
      enum:
        - asc
        - desc
      in: query
      name: order
      required: false
      type: string
    QueryParams.orderBy:
      default: created_time
      in: query
      name: orderBy
      required: false
      type: string
    QueryParams.page:
      default: 1
      format: int32
      in: query
      name: page
      required: false
      type: integer
    QueryParams.pageSize:
      default: 20
      format: int32
      in: query
      name: pageSize
      required: false
      type: integer
    SearchParams:
      description: >-
        Filter results using TSL (Tree Search Language) query syntax.

        Examples: `status.conditions.Reconciled='True'`, `name in ('c1','c2')`,
        `labels.region='us-east'`
      in: query
      name: search
      required: false
      type: string

